<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="{{CSP}}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoPilot</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background, var(--vscode-editor-background));
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      line-height: 1.5;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ===== Toolbar ===== */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.35));
      flex-shrink: 0;
      min-height: 36px;
    }

    .toolbar-title {
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-right: auto;
    }

    #model-select {
      background: var(--vscode-dropdown-background);
      color: var(--vscode-dropdown-foreground);
      border: 1px solid var(--vscode-dropdown-border, transparent);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      max-width: 160px;
      cursor: pointer;
    }

    .toolbar-btn {
      background: transparent;
      border: none;
      color: var(--vscode-foreground);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 14px;
      line-height: 1;
      opacity: 0.7;
    }
    .toolbar-btn:hover { opacity: 1; background: var(--vscode-toolbar-hoverBackground, rgba(128,128,128,0.15)); }

    /* ===== Messages Area ===== */
    #messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: var(--vscode-scrollbarSlider-background); border-radius: 3px; }

    /* ===== Welcome Screen ===== */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
      gap: 16px;
    }

    .welcome-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--vscode-button-background);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcome-icon svg { color: var(--vscode-button-foreground); }

    .welcome-title {
      font-size: 16px;
      font-weight: 600;
    }

    .welcome-subtitle {
      font-size: 12px;
      opacity: 0.7;
      max-width: 280px;
    }

    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      max-width: 300px;
    }

    .quick-action-btn {
      background: var(--vscode-input-background);
      border: 1px solid var(--vscode-input-border, rgba(128,128,128,0.3));
      color: var(--vscode-foreground);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-size: 12px;
    }
    .quick-action-btn:hover {
      background: var(--vscode-list-hoverBackground, rgba(128,128,128,0.1));
    }
    .quick-action-label { opacity: 0.6; font-size: 11px; display: block; margin-bottom: 2px; }

    /* ===== Message Bubbles ===== */
    .message {
      padding: 12px 16px;
      border-bottom: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.12));
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar.user-avatar {
      background: var(--vscode-charts-purple, #7e57c2);
    }

    .avatar.assistant-avatar {
      background: var(--vscode-button-background);
    }

    .avatar svg { width: 14px; height: 14px; color: #fff; }

    .message-role {
      font-size: 12px;
      font-weight: 600;
    }

    .message-body {
      padding-left: 32px;
    }

    .message.user .message-body {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ===== Markdown Content ===== */
    .message-body h1, .message-body h2, .message-body h3 {
      margin: 12px 0 6px;
      font-weight: 600;
    }
    .message-body h1 { font-size: 1.3em; }
    .message-body h2 { font-size: 1.15em; }
    .message-body h3 { font-size: 1.05em; }

    .message-body p { margin: 4px 0; }

    .message-body ul, .message-body ol {
      margin: 4px 0;
      padding-left: 20px;
    }
    .message-body li { margin: 2px 0; }

    .message-body a {
      color: var(--vscode-textLink-foreground);
      text-decoration: none;
    }
    .message-body a:hover { text-decoration: underline; }

    .message-body blockquote {
      border-left: 3px solid var(--vscode-textBlockQuote-border, rgba(128,128,128,0.5));
      padding: 4px 12px;
      margin: 6px 0;
      opacity: 0.85;
    }

    .message-body code:not(pre code) {
      background: var(--vscode-textCodeBlock-background, rgba(128,128,128,0.15));
      padding: 1px 5px;
      border-radius: 3px;
      font-family: var(--vscode-editor-font-family, 'Consolas', monospace);
      font-size: 0.9em;
    }

    /* ===== Code Blocks ===== */
    .code-block-wrapper {
      margin: 8px 0;
      border: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.25));
      border-radius: 6px;
      overflow: hidden;
    }

    .code-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px 4px 12px;
      background: var(--vscode-editorGroupHeader-tabsBackground, rgba(128,128,128,0.1));
      border-bottom: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.15));
      font-size: 11px;
    }

    .code-lang {
      opacity: 0.6;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .code-actions {
      display: flex;
      gap: 2px;
    }

    .code-action-btn {
      background: transparent;
      border: none;
      color: var(--vscode-foreground);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 11px;
      opacity: 0.6;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .code-action-btn:hover { opacity: 1; background: var(--vscode-toolbar-hoverBackground, rgba(128,128,128,0.15)); }
    .code-action-btn svg { width: 14px; height: 14px; }

    .code-block-wrapper pre {
      margin: 0;
      padding: 10px 14px;
      background: var(--vscode-editor-background);
      overflow-x: auto;
    }

    .code-block-wrapper pre code {
      font-family: var(--vscode-editor-font-family, 'Consolas', monospace);
      font-size: var(--vscode-editor-font-size, 13px);
      line-height: 1.5;
      white-space: pre;
      color: var(--vscode-editor-foreground);
    }

    /* ===== Tool Use Cards ===== */
    .tool-card {
      margin: 8px 0;
      border: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.25));
      border-radius: 6px;
      overflow: hidden;
      font-size: 12px;
    }

    .tool-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--vscode-editorGroupHeader-tabsBackground, rgba(128,128,128,0.1));
      cursor: pointer;
      user-select: none;
    }
    .tool-card-header:hover {
      background: var(--vscode-list-hoverBackground, rgba(128,128,128,0.15));
    }

    .tool-icon { font-size: 14px; flex-shrink: 0; }
    .tool-name { font-weight: 600; }
    .tool-status {
      margin-left: auto;
      font-size: 11px;
      opacity: 0.6;
    }

    .tool-status.running { color: var(--vscode-charts-yellow, #f0c674); }
    .tool-status.complete { color: var(--vscode-charts-green, #4caf50); }
    .tool-status.error { color: var(--vscode-errorForeground, #f44336); }

    .tool-card-body {
      padding: 8px 10px;
      background: var(--vscode-editor-background);
      border-top: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.15));
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: 11px;
      display: none;
    }
    .tool-card.expanded .tool-card-body { display: block; }

    .tool-chevron {
      transition: transform 0.15s;
      font-size: 10px;
    }
    .tool-card.expanded .tool-chevron { transform: rotate(90deg); }

    /* ===== Thinking Indicator ===== */
    .thinking {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .thinking-dots {
      display: flex;
      gap: 4px;
    }

    .thinking-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--vscode-foreground);
      opacity: 0.3;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    .thinking-label {
      font-size: 12px;
      opacity: 0.6;
    }

    /* ===== Streaming cursor ===== */
    .streaming .message-body::after {
      content: '\258C';
      animation: cursorBlink 1s step-end infinite;
      color: var(--vscode-editorCursor-foreground, var(--vscode-foreground));
    }
    @keyframes cursorBlink { 50% { opacity: 0; } }

    .message.error .message-body {
      color: var(--vscode-errorForeground, #f44336);
    }

    /* ===== Context Chips ===== */
    .context-bar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding: 6px 16px 0 48px;
    }

    .context-chip {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--vscode-badge-background, rgba(128,128,128,0.2));
      color: var(--vscode-badge-foreground, var(--vscode-foreground));
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    /* ===== Input Area ===== */
    #input-area {
      padding: 8px 12px 12px;
      border-top: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.35));
      flex-shrink: 0;
    }

    .input-wrapper {
      position: relative;
      border: 1px solid var(--vscode-input-border, rgba(128,128,128,0.4));
      border-radius: 8px;
      background: var(--vscode-input-background);
      overflow: hidden;
    }

    .input-wrapper:focus-within {
      border-color: var(--vscode-focusBorder);
    }

    #user-input {
      width: 100%;
      background: transparent;
      color: var(--vscode-input-foreground);
      border: none;
      padding: 10px 12px;
      padding-right: 40px;
      resize: none;
      font-family: inherit;
      font-size: inherit;
      line-height: 1.4;
      max-height: 150px;
      min-height: 38px;
      outline: none;
    }

    #user-input::placeholder {
      color: var(--vscode-input-placeholderForeground, rgba(128,128,128,0.5));
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 6px 4px;
    }

    .input-hints {
      font-size: 10px;
      opacity: 0.4;
      padding-left: 6px;
    }

    .input-actions {
      display: flex;
      gap: 4px;
    }

    #btn-send {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btn-send:hover:not(:disabled) { background: var(--vscode-button-hoverBackground); }
    #btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
    #btn-send svg { width: 16px; height: 16px; }

    #btn-cancel {
      background: transparent;
      border: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.3));
      color: var(--vscode-foreground);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
      display: none;
    }
    #btn-cancel.visible { display: block; }
    #btn-cancel:hover { background: var(--vscode-toolbar-hoverBackground, rgba(128,128,128,0.15)); }

    /* ===== Autocomplete popup ===== */
    #autocomplete {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      background: var(--vscode-editorSuggestWidget-background, var(--vscode-dropdown-background));
      border: 1px solid var(--vscode-editorSuggestWidget-border, var(--vscode-dropdown-border));
      border-radius: 6px;
      margin-bottom: 4px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #autocomplete.visible { display: block; }

    .autocomplete-item {
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .autocomplete-item:hover, .autocomplete-item.selected {
      background: var(--vscode-list-hoverBackground, rgba(128,128,128,0.15));
    }
    .autocomplete-cmd { font-weight: 600; }
    .autocomplete-desc { opacity: 0.6; }

    /* ===== Changes Panel ===== */
    #changes-panel {
      display: none;
      border-top: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.35));
      flex-shrink: 0;
      max-height: 220px;
      overflow: hidden;
      flex-direction: column;
    }
    #changes-panel.visible { display: flex; }

    .changes-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--vscode-editorGroupHeader-tabsBackground, rgba(128,128,128,0.08));
      border-bottom: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.15));
      flex-shrink: 0;
    }

    .changes-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
    }

    .changes-stats {
      display: flex;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .stat-add { color: var(--vscode-gitDecoration-addedResourceForeground, #4caf50); }
    .stat-del { color: var(--vscode-gitDecoration-deletedResourceForeground, #f44336); }
    .stat-files { opacity: 0.6; font-weight: 400; font-size: 11px; }

    .changes-actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .changes-btn {
      background: transparent;
      border: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.3));
      color: var(--vscode-foreground);
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
    }
    .changes-btn:hover {
      background: var(--vscode-toolbar-hoverBackground, rgba(128,128,128,0.15));
    }
    .changes-btn.keep {
      border-color: var(--vscode-gitDecoration-addedResourceForeground, #4caf50);
      color: var(--vscode-gitDecoration-addedResourceForeground, #4caf50);
    }
    .changes-btn.discard {
      border-color: var(--vscode-gitDecoration-deletedResourceForeground, #f44336);
      color: var(--vscode-gitDecoration-deletedResourceForeground, #f44336);
    }

    .changes-list {
      overflow-y: auto;
      flex: 1;
    }

    .change-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      font-size: 12px;
      border-bottom: 1px solid var(--vscode-panel-border, rgba(128,128,128,0.08));
    }
    .change-row:hover {
      background: var(--vscode-list-hoverBackground, rgba(128,128,128,0.1));
    }

    .change-icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }
    .change-icon.edit {
      color: var(--vscode-gitDecoration-modifiedResourceForeground, #e2c08d);
      border: 1px solid currentColor;
    }
    .change-icon.create {
      color: var(--vscode-gitDecoration-addedResourceForeground, #4caf50);
      border: 1px solid currentColor;
    }

    .change-file {
      flex: 1;
      overflow: hidden;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .change-filename {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .change-dir {
      font-size: 10px;
      opacity: 0.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .change-nums {
      display: flex;
      gap: 6px;
      font-size: 11px;
      font-family: var(--vscode-editor-font-family, monospace);
      flex-shrink: 0;
    }

    .change-row-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
      align-items: center;
    }

    .change-row-btn {
      background: transparent;
      border: none;
      color: var(--vscode-foreground);
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 11px;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .change-row-btn:hover { opacity: 1; background: var(--vscode-toolbar-hoverBackground, rgba(128,128,128,0.15)); }

    .change-row-btn.btn-keep {
      color: var(--vscode-gitDecoration-addedResourceForeground, #4caf50);
      font-size: 14px;
      line-height: 1;
    }
    .change-row-btn.btn-keep:hover { opacity: 1; }

    .change-row-btn.btn-discard {
      color: var(--vscode-gitDecoration-deletedResourceForeground, #f44336);
      font-size: 14px;
      line-height: 1;
    }
    .change-row-btn.btn-discard:hover { opacity: 1; }

    .toggle-changes-btn {
      background: transparent;
      border: none;
      color: var(--vscode-foreground);
      cursor: pointer;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 10px;
      opacity: 0.5;
    }
    .toggle-changes-btn:hover { opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <span class="toolbar-title">GoPilot</span>
      <select id="model-select" title="Select model"></select>
      <button class="toolbar-btn" id="btn-new-conversation" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M14 1H2a1 1 0 00-1 1v10a1 1 0 001 1h3l3 2 3-2h3a1 1 0 001-1V2a1 1 0 00-1-1zM4 5h8v1H4V5zm0 3h6v1H4V8z" fill="currentColor"/></svg>
      </button>
    </header>
    <div id="messages"></div>
    <div id="changes-panel">
      <div class="changes-header">
        <span class="changes-title">Changes</span>
        <div class="changes-stats">
          <span class="stat-add" id="stat-additions">+0</span>
          <span class="stat-del" id="stat-deletions">-0</span>
          <span class="stat-files" id="stat-files">0 files</span>
        </div>
        <div class="changes-actions">
          <button class="changes-btn keep" id="btn-keep-all" title="Keep all changes">Keep All</button>
          <button class="changes-btn discard" id="btn-discard-all" title="Discard all changes">Discard All</button>
          <button class="toggle-changes-btn" id="btn-toggle-changes" title="Toggle change list">&#x25BC;</button>
        </div>
      </div>
      <div class="changes-list" id="changes-list"></div>
    </div>
    <div id="input-area">
      <div class="input-wrapper">
        <div id="autocomplete"></div>
        <textarea id="user-input" placeholder="Ask anything... (/ for commands, @ for files)" rows="1"></textarea>
        <div class="input-footer">
          <span class="input-hints">Enter to send, Shift+Enter for newline</span>
          <div class="input-actions">
            <button id="btn-cancel">Stop</button>
            <button id="btn-send" title="Send">
              <svg viewBox="0 0 16 16"><path d="M1 1.5l14 6.5-14 6.5V9l8-1-8-1V1.5z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script nonce="{{NONCE}}" src="{{SCRIPT_URI}}"></script>
</body>
</html>
